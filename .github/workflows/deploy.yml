name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/p0tfur/warera:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deployment
        if: github.ref == 'refs/heads/master'
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK }}" ] || [ -z "${{ secrets.COOLIFY_TOKEN_DMGWARERA }}" ]; then
            echo "Missing COOLIFY_WEBHOOK or COOLIFY_TOKEN_DMGWARERA secret" >&2
            exit 1
          fi
          curl --fail --show-error --silent --request GET "${{ secrets.COOLIFY_WEBHOOK }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN_DMGWARERA }}"
