name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: # manual trigger from GitHub

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nazwa obrazu (lowercase)
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy w Coolify
        if: ${{ vars.COOLIFY_WEBHOOK_URL != '' }}
        run: |
          echo "Wysyłam webhook do Coolify..."
          curl -fsS -X POST "${{ vars.COOLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            | tee /tmp/curl.out
        continue-on-error: false

      - name: Brak webhooka — instrukcja
        if: ${{ vars.COOLIFY_WEBHOOK_URL == '' }}
        run: |
          echo "::warning::Ustaw zmienną repozytorium COOLIFY_WEBHOOK_URL (Settings → Secrets and variables → Actions → Variables), aby automatycznie deployować do Coolify. Obraz jest już w GHCR i gotowy do ręcznego deploya."
