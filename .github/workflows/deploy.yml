name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: # manual trigger from GitHub

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (lowercase)
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve webhook URL
        id: webhook
        run: |
          URL="${{ vars.COOLIFY_WEBHOOK_URL || secrets.COOLIFY_WEBHOOK_URL }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          if [ -z "$URL" ]; then
            echo "::warning::Add COOLIFY_WEBHOOK_URL as a repository Variable (Settings → Secrets and variables → Actions → Variables) or Secret to auto-deploy. Image is already in GHCR and ready for manual deploy."
          else
            echo "Webhook URL found, triggering deploy..."
          fi

      - name: Trigger deploy in Coolify
        if: ${{ steps.webhook.outputs.url != '' }}
        run: |
          curl -fsS -X POST "${{ steps.webhook.outputs.url }}" \
            -H "Content-Type: application/json" \
            | tee /tmp/curl.out
